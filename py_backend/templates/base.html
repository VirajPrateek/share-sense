<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareSense</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
        .navbar { background: #6c63ff; color: white; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(108,99,255,0.3); }
        .navbar h1 { font-size: 1.3rem; font-weight: 700; }
        .navbar a, .navbar button { color: white; text-decoration: none; background: none; border: none; cursor: pointer; font-size: 0.95rem; padding: 0.4rem 0.8rem; border-radius: 6px; transition: background 0.2s; }
        .navbar a:hover, .navbar button:hover { background: rgba(255,255,255,0.15); }
        .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #333; }
        input, select { width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; margin-bottom: 0.8rem; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: #6c63ff; }
        .btn { display: inline-block; padding: 0.7rem 1.5rem; background: #6c63ff; color: white; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; text-decoration: none; text-align: center; width: 100%; }
        .btn:hover { background: #5a52d5; }
        .btn-outline { background: transparent; color: #6c63ff; border: 1.5px solid #6c63ff; }
        .btn-outline:hover { background: #6c63ff; color: white; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-green { background: #27ae60; }
        .btn-green:hover { background: #219a52; }
        .btn-sm { padding: 0.4rem 0.8rem; width: auto; font-size: 0.85rem; }
        .alert { padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
        .alert-error { background: #fde8e8; color: #c0392b; }
        .alert-success { background: #e8fde8; color: #27ae60; }
        .link { color: #6c63ff; text-decoration: none; }
        .link:hover { text-decoration: underline; }
        .text-center { text-align: center; }
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .list-item { padding: 0.8rem 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .list-item:last-child { border-bottom: none; }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; background: #e8e6ff; color: #6c63ff; }
        .badge-green { background: #e8fde8; color: #27ae60; }
        .badge-red { background: #fde8e8; color: #e74c3c; }
        .badge-yellow { background: #fff8e1; color: #f39c12; }
        .empty { text-align: center; color: #999; padding: 2rem 0; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .tab { padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; border: 1.5px solid #ddd; background: white; transition: all 0.2s; }
        .tab.active { background: #6c63ff; color: white; border-color: #6c63ff; }
        .balance-positive { color: #27ae60; font-weight: 600; }
        .balance-negative { color: #e74c3c; font-weight: 600; }
        .balance-zero { color: #999; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1><a href="#dashboard" style="color:white;text-decoration:none">💰 ShareSense</a></h1>
        <div id="nav-right"></div>
    </nav>
    <div class="container" id="app"></div>
    <script>
        const API = '';
        const state = { token: localStorage.getItem('ss_token'), user: JSON.parse(localStorage.getItem('ss_user') || 'null') };

        function setAuth(token, user) { state.token = token; state.user = user; localStorage.setItem('ss_token', token); localStorage.setItem('ss_user', JSON.stringify(user)); }
        function clearAuth() { state.token = null; state.user = null; localStorage.removeItem('ss_token'); localStorage.removeItem('ss_user'); }

        async function api(path, opts = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
            const res = await fetch(API + path, { ...opts, headers });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || data.message || 'Request failed');
            return data;
        }
        function showMsg(text, type = 'error') {
            const app = document.getElementById('app');
            const existing = document.getElementById('msg-alert');
            if (existing) existing.remove();
            const div = document.createElement('div'); div.id = 'msg-alert'; div.className = 'alert alert-' + type; div.textContent = text;
            app.prepend(div); setTimeout(() => div.remove(), 4000);
        }
        function renderNav() {
            const nav = document.getElementById('nav-right');
            nav.innerHTML = state.user ? '<span>' + state.user.name + '</span> <button onclick="logout()">Logout</button>' : '';
        }
        async function logout() { clearAuth(); route(); }
        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // --- Auth Pages ---
        function loginPage() {
            document.getElementById('app').innerHTML = '<div class="card mt-2"><h2>Login</h2><form onsubmit="handleLogin(event)"><input type="email" id="l-email" placeholder="Email" required><input type="password" id="l-pass" placeholder="Password" required><button class="btn" type="submit">Login</button></form><p class="text-center mt-1">No account? <a href="#register" class="link">Register</a></p></div>';
        }
        async function handleLogin(e) {
            e.preventDefault();
            try { const data = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value }) }); setAuth(data.token, data.user); location.hash = '#dashboard'; } catch (err) { showMsg(err.message); }
        }
        function registerPage() {
            document.getElementById('app').innerHTML = '<div class="card mt-2"><h2>Register</h2><form onsubmit="handleRegister(event)"><input type="text" id="r-name" placeholder="Name" required><input type="email" id="r-email" placeholder="Email" required><input type="password" id="r-pass" placeholder="Password (min 6 chars)" required minlength="6"><button class="btn" type="submit">Register</button></form><p class="text-center mt-1">Have an account? <a href="#login" class="link">Login</a></p></div>';
        }
        async function handleRegister(e) {
            e.preventDefault();
            try { await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ name: document.getElementById('r-name').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value }) }); showMsg('Registered! Please login.', 'success'); location.hash = '#login'; } catch (err) { showMsg(err.message); }
        }

        // --- Dashboard ---
        async function dashboardPage() {
            const app = document.getElementById('app');
            app.innerHTML = '<div class="card"><p class="empty">Loading...</p></div>';
            try {
                const data = await api('/api/flats');
                let html = '<div class="card"><div class="flex-between mb-1"><h2>My Flats</h2><button class="btn btn-sm" onclick="location.hash=\'#new-flat\'">+ New Flat</button></div>';
                if (data.flats.length === 0) { html += '<p class="empty">No flats yet. Create one!</p>'; }
                else { data.flats.forEach(f => { html += '<div class="list-item"><div><strong>' + esc(f.name) + '</strong><br><small style="color:#999">Created ' + new Date(f.created_at).toLocaleDateString() + '</small></div><a href="#flat/' + f.id + '" class="btn btn-sm btn-outline">View</a></div>'; }); }
                html += '</div>';
                app.innerHTML = html;
            } catch (err) { showMsg(err.message); }
        }
        function newFlatPage() {
            document.getElementById('app').innerHTML = '<div class="card"><h2>Create New Flat</h2><form onsubmit="handleCreateFlat(event)"><input type="text" id="f-name" placeholder="Flat name (e.g. Flat 101)" required><button class="btn" type="submit">Create</button></form><p class="mt-1"><a href="#dashboard" class="link">← Back</a></p></div>';
        }
        async function handleCreateFlat(e) {
            e.preventDefault();
            try { await api('/api/flats', { method: 'POST', body: JSON.stringify({ name: document.getElementById('f-name').value }) }); showMsg('Flat created!', 'success'); location.hash = '#dashboard'; } catch (err) { showMsg(err.message); }
        }

        // --- Flat Detail (tabbed: Balances, Expenses, Settlements, Members) ---
        let flatCache = {};
        async function flatDetailPage(flatId, tab) {
            tab = tab || 'balances';
            const app = document.getElementById('app');
            app.innerHTML = '<div class="card"><p class="empty">Loading...</p></div>';
            try {
                const [flatData, membersData] = await Promise.all([api('/api/flats/' + flatId), api('/api/flats/' + flatId + '/members')]);
                flatCache = { flat: flatData.flat, members: membersData.members, flatId };
                let html = '<div class="card"><div class="flex-between mb-1"><h2>' + esc(flatData.flat.name) + '</h2><a href="#dashboard" class="link">← Back</a></div>';
                html += '<div class="tabs">';
                ['balances','expenses','settlements','members'].forEach(t => {
                    html += '<div class="tab ' + (t===tab?'active':'') + '" onclick="flatDetailPage(\'' + flatId + '\',\'' + t + '\')">' + t.charAt(0).toUpperCase() + t.slice(1) + '</div>';
                });
                html += '</div><div id="tab-content"></div></div>';
                app.innerHTML = html;
                if (tab === 'balances') renderBalances(flatId);
                else if (tab === 'expenses') renderExpenses(flatId);
                else if (tab === 'settlements') renderSettlements(flatId);
                else if (tab === 'members') renderMembers(flatId);
            } catch (err) { showMsg(err.message); }
        }

        // --- Balances Tab ---
        async function renderBalances(flatId) {
            const el = document.getElementById('tab-content');
            try {
                const data = await api('/api/flats/' + flatId + '/balances');
                let html = '';
                if (data.balances.length === 0) { html = '<p class="empty">No balances yet. Add an expense!</p>'; }
                else {
                    data.balances.forEach(b => {
                        let cls = 'balance-zero', label = 'Settled up';
                        if (b.balance > 0) { cls = 'balance-positive'; label = 'is owed $' + b.balance.toFixed(2); }
                        else if (b.balance < 0) { cls = 'balance-negative'; label = 'owes $' + Math.abs(b.balance).toFixed(2); }
                        html += '<div class="list-item"><strong>' + esc(b.name) + '</strong><span class="' + cls + '">' + label + '</span></div>';
                    });
                }
                el.innerHTML = html;
            } catch (err) { el.innerHTML = '<p class="empty">Error loading balances</p>'; }
        }

        // --- Expenses Tab ---
        async function renderExpenses(flatId) {
            const el = document.getElementById('tab-content');
            try {
                const data = await api('/api/flats/' + flatId + '/expenses');
                const members = flatCache.members || [];
                let html = '<h2 class="mb-1">Add Expense</h2>';
                html += '<form onsubmit="handleAddExpense(event, \'' + flatId + '\')">';
                html += '<input type="text" id="e-desc" placeholder="Description (e.g. Groceries)" required>';
                html += '<input type="number" id="e-amount" placeholder="Amount" step="0.01" min="0.01" required>';
                html += '<select id="e-payer">';
                members.forEach(m => { html += '<option value="' + m.id + '"' + (m.id === state.user.id ? ' selected' : '') + '>' + esc(m.name) + (m.id === state.user.id ? ' (You)' : '') + '</option>'; });
                html += '</select>';
                html += '<button class="btn" type="submit">Add Expense</button></form>';
                html += '<h2 class="mt-2 mb-1">Expense History</h2>';
                if (data.expenses.length === 0) { html += '<p class="empty">No expenses yet.</p>'; }
                else {
                    data.expenses.forEach(e => {
                        html += '<div class="list-item"><div><strong>' + esc(e.description) + '</strong><br><small style="color:#999">' + esc(e.payer_name) + ' paid · ' + new Date(e.timestamp).toLocaleDateString() + '</small></div><div style="text-align:right"><strong>$' + parseFloat(e.amount).toFixed(2) + '</strong><br><button class="btn btn-sm btn-danger mt-1" onclick="deleteExpense(\'' + flatId + '\',\'' + e.id + '\')">×</button></div></div>';
                    });
                }
                el.innerHTML = html;
            } catch (err) { el.innerHTML = '<p class="empty">Error loading expenses</p>'; }
        }
        async function handleAddExpense(e, flatId) {
            e.preventDefault();
            try {
                await api('/api/flats/' + flatId + '/expenses', { method: 'POST', body: JSON.stringify({ description: document.getElementById('e-desc').value, amount: parseFloat(document.getElementById('e-amount').value), payerId: document.getElementById('e-payer').value }) });
                showMsg('Expense added!', 'success');
                flatDetailPage(flatId, 'expenses');
            } catch (err) { showMsg(err.message); }
        }
        async function deleteExpense(flatId, expenseId) {
            if (!confirm('Delete this expense?')) return;
            try { await api('/api/flats/' + flatId + '/expenses/' + expenseId, { method: 'DELETE' }); showMsg('Deleted.', 'success'); flatDetailPage(flatId, 'expenses'); } catch (err) { showMsg(err.message); }
        }

        // --- Settlements Tab ---
        async function renderSettlements(flatId) {
            const el = document.getElementById('tab-content');
            try {
                const data = await api('/api/flats/' + flatId + '/settlements');
                const members = flatCache.members || [];
                let html = '<h2 class="mb-1">Record a Payment</h2>';
                html += '<form onsubmit="handleSettle(event, \'' + flatId + '\')">';
                html += '<select id="s-debtor"><option value="">Who paid?</option>';
                members.forEach(m => { html += '<option value="' + m.id + '">' + esc(m.name) + '</option>'; });
                html += '</select><select id="s-creditor"><option value="">Paid to whom?</option>';
                members.forEach(m => { html += '<option value="' + m.id + '">' + esc(m.name) + '</option>'; });
                html += '</select>';
                html += '<input type="number" id="s-amount" placeholder="Amount" step="0.01" min="0.01" required>';
                html += '<button class="btn" type="submit">Propose Settlement</button></form>';
                html += '<h2 class="mt-2 mb-1">Settlement History</h2>';
                if (data.settlements.length === 0) { html += '<p class="empty">No settlements yet.</p>'; }
                else {
                    data.settlements.forEach(s => {
                        let statusBadge = s.status === 'confirmed' ? '<span class="badge badge-green">Confirmed</span>' : '<span class="badge badge-yellow">Pending</span>';
                        html += '<div class="list-item"><div><strong>' + esc(s.debtor_name) + ' → ' + esc(s.creditor_name) + '</strong><br><small style="color:#999">$' + parseFloat(s.amount).toFixed(2) + ' · ' + new Date(s.created_at).toLocaleDateString() + '</small></div><div style="text-align:right">' + statusBadge;
                        if (s.status === 'pending') {
                            html += '<br><button class="btn btn-sm btn-green mt-1" onclick="confirmSettlement(\'' + flatId + '\',\'' + s.id + '\')">Confirm</button>';
                        }
                        html += '</div></div>';
                    });
                }
                el.innerHTML = html;
            } catch (err) { el.innerHTML = '<p class="empty">Error loading settlements</p>'; }
        }
        async function handleSettle(e, flatId) {
            e.preventDefault();
            const debtorId = document.getElementById('s-debtor').value;
            const creditorId = document.getElementById('s-creditor').value;
            if (!debtorId || !creditorId) { showMsg('Select both parties'); return; }
            if (debtorId === creditorId) { showMsg('Payer and receiver must be different'); return; }
            try {
                await api('/api/flats/' + flatId + '/settlements', { method: 'POST', body: JSON.stringify({ debtorId, creditorId, amount: parseFloat(document.getElementById('s-amount').value) }) });
                showMsg('Settlement proposed!', 'success');
                flatDetailPage(flatId, 'settlements');
            } catch (err) { showMsg(err.message); }
        }
        async function confirmSettlement(flatId, settlementId) {
            try { await api('/api/flats/' + flatId + '/settlements/' + settlementId + '/confirm', { method: 'POST' }); showMsg('Confirmed!', 'success'); flatDetailPage(flatId, 'settlements'); } catch (err) { showMsg(err.message); }
        }

        // --- Members Tab ---
        function renderMembers(flatId) {
            const members = flatCache.members || [];
            let html = '';
            members.forEach(m => {
                html += '<div class="list-item"><div><strong>' + esc(m.name) + '</strong><br><small style="color:#999">' + esc(m.email) + '</small></div>';
                if (m.id !== state.user.id) { html += '<button class="btn btn-sm btn-danger" onclick="removeMember(\'' + flatId + '\',\'' + m.id + '\')">Remove</button>'; }
                else { html += '<span class="badge">You</span>'; }
                html += '</div>';
            });
            html += '<h2 class="mt-2 mb-1">Add Member</h2>';
            html += '<form onsubmit="handleAddMember(event, \'' + flatId + '\')"><input type="email" id="add-email" placeholder="Member\'s email address"><button class="btn btn-sm" type="submit">Add</button></form>';
            document.getElementById('tab-content').innerHTML = html;
        }
        async function handleAddMember(e, flatId) {
            e.preventDefault();
            try { await api('/api/flats/' + flatId + '/members', { method: 'POST', body: JSON.stringify({ email: document.getElementById('add-email').value }) }); showMsg('Member added!', 'success'); flatDetailPage(flatId, 'members'); } catch (err) { showMsg(err.message); }
        }
        async function removeMember(flatId, userId) {
            if (!confirm('Remove this member?')) return;
            try { await api('/api/flats/' + flatId + '/members/' + userId, { method: 'DELETE' }); showMsg('Member removed.', 'success'); flatDetailPage(flatId, 'members'); } catch (err) { showMsg(err.message); }
        }

        // --- Router ---
        function route() {
            renderNav();
            const hash = location.hash.slice(1) || '';
            if (!state.token) { return hash === 'register' ? registerPage() : loginPage(); }
            if (hash === 'dashboard' || hash === '') return dashboardPage();
            if (hash === 'new-flat') return newFlatPage();
            if (hash.startsWith('flat/')) return flatDetailPage(hash.split('/')[1]);
            dashboardPage();
        }
        window.addEventListener('hashchange', route);
        route();
    </script>
</body>
</html>
