<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareSense</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    brand: '#006A6A', 'brand-light': '#e0f2f1', 'brand-container': '#004f4f',
                    surface: '#f6faf8', 'surface-low': '#f0f4f2', 'surface-card': '#ffffff',
                    'on-surface': '#181d1c', 'on-surface-light': '#6e7979',
                    danger: '#ba1a1a', 'danger-bg': 'rgba(186,26,26,0.08)',
                    'success-bg': 'rgba(0,106,106,0.06)',
                },
                fontFamily: { headline: ['Manrope','sans-serif'], body: ['Inter','sans-serif'] },
            }
        }
    }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .mso-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { min-height: 100dvh; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body">

<!-- Top Bar -->
<header id="topbar" class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md shadow-[0_4px_20px_rgba(24,29,28,0.04)]" style="display:none">
    <div class="flex items-center justify-between px-5 h-14 max-w-lg mx-auto">
        <button onclick="location.hash='#dashboard'" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-brand-light transition-colors">
            <span class="material-symbols-outlined text-brand" id="topbar-left-icon">home_work</span>
        </button>
        <h1 class="font-headline lowercase text-base tracking-tight font-bold text-brand">sharesense</h1>
        <button onclick="logout()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-brand-light transition-colors">
            <span class="material-symbols-outlined text-brand text-[20px]">logout</span>
        </button>
    </div>
</header>

<!-- Main Content -->
<main id="app" class="pt-16 pb-24 px-5 max-w-lg mx-auto space-y-6"></main>

<!-- Bottom Nav -->
<nav id="footer-nav" class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-white/70 backdrop-blur-xl shadow-[0_-10px_40px_rgba(24,29,28,0.06)]" style="display:none">
    <div class="flex justify-around items-center max-w-lg mx-auto px-4 pt-2 pb-3 h-[68px]"></div>
</nav>

<script>
const API = '', CUR = '₹';
const S = { token: localStorage.getItem('ss_token'), user: JSON.parse(localStorage.getItem('ss_user')||'null'), flatId: null, tab: 'ledger' };
let flatCache = {};

function setAuth(t,u){ S.token=t; S.user=u; localStorage.setItem('ss_token',t); localStorage.setItem('ss_user',JSON.stringify(u)); }
function clearAuth(){ S.token=null; S.user=null; localStorage.removeItem('ss_token'); localStorage.removeItem('ss_user'); }
async function api(p,o={}){ const h={'Content-Type':'application/json'}; if(S.token) h['Authorization']='Bearer '+S.token; const r=await fetch(API+p,{...o,headers:h}); const d=await r.json(); if(!r.ok) throw new Error(d.error||d.message||'Failed'); return d; }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
async function logout(){ clearAuth(); hideChrome(); route(); }

function showChrome(){ document.getElementById('topbar').style.display=''; }
function hideChrome(){ document.getElementById('topbar').style.display='none'; document.getElementById('footer-nav').style.display='none'; }

function showMsg(text, type='error'){
    const ex=document.getElementById('toast'); if(ex) ex.remove();
    const cls = type==='success' ? 'bg-brand text-white' : 'bg-danger text-white';
    const d=document.createElement('div'); d.id='toast';
    d.className='fixed top-16 left-1/2 -translate-x-1/2 z-[99] px-4 py-2 rounded-lg text-xs font-medium shadow-lg '+cls;
    d.textContent=text; document.body.appendChild(d); setTimeout(()=>d.remove(),3000);
}

function showFooter(flatId, tab){
    S.flatId=flatId; S.tab=tab||'ledger';
    const nav=document.getElementById('footer-nav');
    const tabs=[
        {id:'ledger',icon:'account_balance_wallet',label:'ledger'},
        {id:'expenses',icon:'receipt_long',label:'split'},
        {id:'settlements',icon:'handshake',label:'settle'},
        {id:'members',icon:'home_work',label:'house'}
    ];
    const inner=nav.querySelector('div');
    inner.innerHTML=tabs.map(t=>{
        const active=t.id===S.tab;
        const cls=active?'text-brand bg-brand-light rounded-xl px-4 py-1.5':'text-on-surface-light px-4 py-1.5 hover:text-brand';
        const fill=active?'mso-fill':'';
        return '<a class="flex flex-col items-center justify-center '+cls+' active:scale-90 transition-transform duration-150 cursor-pointer" onclick="switchTab(\''+flatId+'\',\''+t.id+'\')"><span class="material-symbols-outlined '+fill+'">'+t.icon+'</span><span class="font-body text-[10px] font-medium tracking-wide">'+t.label+'</span></a>';
    }).join('');
    nav.style.display='';
}
function switchTab(fid,tab){ flatDetailPage(fid,tab); }

// ── Auth Pages ──
function loginPage(){
    hideChrome();
    document.getElementById('app').className='flex flex-col items-center justify-center min-h-[80dvh] px-5 max-w-lg mx-auto';
    document.getElementById('app').innerHTML=`
        <div class="w-full space-y-6">
            <div class="text-center space-y-1">
                <h1 class="font-headline text-2xl font-extrabold text-brand lowercase tracking-tight">sharesense</h1>
                <p class="text-on-surface-light text-xs">split expenses, stay in harmony</p>
            </div>
            <div class="bg-surface-card rounded-2xl p-6 shadow-[0_4px_20px_rgba(24,29,28,0.04)] space-y-4">
                <form onsubmit="handleLogin(event)" class="space-y-3">
                    <input type="email" id="l-email" placeholder="Email" required class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                    <input type="password" id="l-pass" placeholder="Password" required class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                    <button class="w-full py-3 bg-brand text-white rounded-xl text-sm font-semibold active:scale-[0.98] transition-transform" type="submit">Login</button>
                </form>
                <p class="text-center text-xs text-on-surface-light">No account? <a href="#register" class="text-brand font-semibold">Register</a></p>
            </div>
        </div>`;
}
async function handleLogin(e){
    e.preventDefault();
    try{ const d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:document.getElementById('l-email').value,password:document.getElementById('l-pass').value})}); setAuth(d.token,d.user); location.hash='#dashboard'; }catch(err){ showMsg(err.message); }
}
function registerPage(){
    hideChrome();
    document.getElementById('app').className='flex flex-col items-center justify-center min-h-[80dvh] px-5 max-w-lg mx-auto';
    document.getElementById('app').innerHTML=`
        <div class="w-full space-y-6">
            <div class="text-center space-y-1">
                <h1 class="font-headline text-2xl font-extrabold text-brand lowercase tracking-tight">sharesense</h1>
                <p class="text-on-surface-light text-xs">create your account</p>
            </div>
            <div class="bg-surface-card rounded-2xl p-6 shadow-[0_4px_20px_rgba(24,29,28,0.04)] space-y-4">
                <form onsubmit="handleRegister(event)" class="space-y-3">
                    <input type="text" id="r-name" placeholder="Name" required class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                    <input type="email" id="r-email" placeholder="Email" required class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                    <input type="password" id="r-pass" placeholder="Password (min 6 chars)" required minlength="6" class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                    <button class="w-full py-3 bg-brand text-white rounded-xl text-sm font-semibold active:scale-[0.98] transition-transform" type="submit">Register</button>
                </form>
                <p class="text-center text-xs text-on-surface-light">Have an account? <a href="#login" class="text-brand font-semibold">Login</a></p>
            </div>
        </div>`;
}
async function handleRegister(e){
    e.preventDefault();
    try{ await api('/api/auth/register',{method:'POST',body:JSON.stringify({name:document.getElementById('r-name').value,email:document.getElementById('r-email').value,password:document.getElementById('r-pass').value})}); showMsg('Registered! Please login.','success'); location.hash='#login'; }catch(err){ showMsg(err.message); }
}
</script>

<script>
// ── Dashboard ──
async function dashboardPage(){
    showChrome(); document.getElementById('footer-nav').style.display='none';
    const app=document.getElementById('app');
    app.className='pt-16 pb-24 px-5 max-w-lg mx-auto space-y-6';
    app.innerHTML='<div class="text-center py-10 text-on-surface-light text-xs">Loading...</div>';
    try{
        const d=await api('/api/flats');
        let h='<section class="space-y-4">';
        h+='<div class="flex items-center justify-between"><h2 class="font-headline text-xl font-bold tracking-tight">My Flats</h2>';
        h+='<button onclick="location.hash=\'#new-flat\'" class="text-brand text-xs font-semibold flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">add_circle</span>New</button></div>';
        if(d.flats.length===0){
            h+='<div class="bg-surface-card rounded-2xl p-8 shadow-[0_4px_20px_rgba(24,29,28,0.04)] text-center"><span class="material-symbols-outlined text-4xl text-on-surface-light mb-2">home_work</span><p class="text-on-surface-light text-xs">No flats yet. Create one!</p></div>';
        } else {
            d.flats.forEach(f=>{
                h+='<a href="#flat/'+f.id+'" class="block bg-surface-card rounded-2xl p-5 shadow-[0_4px_20px_rgba(24,29,28,0.04)] active:scale-[0.98] transition-transform">';
                h+='<div class="flex items-center gap-4"><div class="w-11 h-11 rounded-xl bg-brand-light flex items-center justify-center"><span class="material-symbols-outlined text-brand">apartment</span></div>';
                h+='<div class="flex-1"><p class="font-headline text-sm font-bold">'+esc(f.name)+'</p><p class="text-on-surface-light text-[11px]">Joined '+new Date(f.created_at).toLocaleDateString()+'</p></div>';
                h+='<span class="material-symbols-outlined text-on-surface-light text-[20px]">chevron_right</span></div></a>';
            });
        }
        h+='</section>';
        app.innerHTML=h;
    }catch(err){ showMsg(err.message); }
}

function newFlatPage(){
    showChrome(); document.getElementById('footer-nav').style.display='none';
    const app=document.getElementById('app');
    app.className='pt-16 pb-24 px-5 max-w-lg mx-auto space-y-6';
    app.innerHTML=`
        <div class="bg-surface-card rounded-2xl p-6 shadow-[0_4px_20px_rgba(24,29,28,0.04)] space-y-4">
            <h2 class="font-headline text-lg font-bold">Create New Flat</h2>
            <form onsubmit="handleCreateFlat(event)" class="space-y-3">
                <input type="text" id="f-name" placeholder="Flat name (e.g. Flat 101)" required class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                <button class="w-full py-3 bg-brand text-white rounded-xl text-sm font-semibold active:scale-[0.98] transition-transform" type="submit">Create</button>
            </form>
            <a href="#dashboard" class="text-brand text-xs font-semibold flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">arrow_back</span>Back</a>
        </div>`;
}
async function handleCreateFlat(e){
    e.preventDefault();
    try{ await api('/api/flats',{method:'POST',body:JSON.stringify({name:document.getElementById('f-name').value})}); showMsg('Flat created!','success'); location.hash='#dashboard'; }catch(err){ showMsg(err.message); }
}

// ── Flat Detail ──
async function flatDetailPage(fid,tab){
    tab=tab||'ledger';
    showChrome();
    const app=document.getElementById('app');
    app.className='pt-16 pb-24 px-5 max-w-lg mx-auto space-y-6';
    app.innerHTML='<div class="text-center py-10 text-on-surface-light text-xs">Loading...</div>';
    try{
        const [fd,md]=await Promise.all([api('/api/flats/'+fid),api('/api/flats/'+fid+'/members')]);
        flatCache={flat:fd.flat,members:md.members,flatId:fid};
        let h='<div class="flex items-center gap-3 mb-2"><a href="#dashboard" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-brand-light transition-colors"><span class="material-symbols-outlined text-brand text-[20px]">arrow_back</span></a>';
        h+='<h2 class="font-headline text-lg font-bold tracking-tight">'+esc(fd.flat.name)+'</h2></div>';
        h+='<div id="tab-content"></div>';
        app.innerHTML=h;
        showFooter(fid,tab);
        if(tab==='ledger') renderLedger(fid);
        else if(tab==='expenses') renderExpenses(fid);
        else if(tab==='settlements') renderSettlements(fid);
        else if(tab==='members') renderMembers(fid);
    }catch(err){ showMsg(err.message); }
}
</script>

<script>
// ── Ledger Tab (Balances + Settlement CTA) ──
async function renderLedger(fid){
    const el=document.getElementById('tab-content');
    try{
        const [bd,ed]=await Promise.all([api('/api/flats/'+fid+'/balances'),api('/api/flats/'+fid+'/expenses')]);
        const transfers=bd.transfers||[];
        const expenses=ed.expenses||[];
        const members=flatCache.members||[];

        // Compute totals for current user
        let youOwe=0, youAreOwed=0;
        transfers.forEach(t=>{
            if(t.from_id===S.user.id) youOwe+=t.amount;
            if(t.to_id===S.user.id) youAreOwed+=t.amount;
        });
        const net=youAreOwed-youOwe;

        let h='';
        // Bento balance cards
        h+='<div class="grid grid-cols-2 gap-3">';
        h+='<div class="col-span-2 p-6 rounded-2xl bg-surface-card shadow-[0_4px_20px_rgba(24,29,28,0.04)] text-center">';
        h+='<p class="text-on-surface-light text-[11px] mb-1">Total Net Balance</p>';
        const netCls=net>=0?'text-brand':'text-danger';
        h+='<h2 class="font-headline font-extrabold text-3xl '+netCls+' tracking-tight">'+(net>=0?'+':'-')+CUR+Math.abs(net).toFixed(2)+'</h2></div>';
        h+='<div class="p-4 rounded-2xl bg-success-bg"><p class="text-[10px] text-brand mb-1">You are owed</p><p class="font-headline font-bold text-xl text-brand">'+CUR+youAreOwed.toFixed(2)+'</p></div>';
        h+='<div class="p-4 rounded-2xl bg-danger-bg"><p class="text-[10px] text-danger mb-1">You owe</p><p class="font-headline font-bold text-xl text-danger">'+CUR+youOwe.toFixed(2)+'</p></div>';
        h+='</div>';

        // Settlement CTA
        h+='<div class="relative overflow-hidden p-5 rounded-2xl bg-gradient-to-br from-brand to-brand-container text-white shadow-xl mt-4">';
        h+='<div class="relative z-10 flex items-center justify-between"><div class="space-y-1"><h3 class="font-headline font-bold text-base">Record Settlement</h3><p class="text-[11px] opacity-90 max-w-[200px]">Paid back a flatmate? Keep the ledger balanced.</p></div>';
        h+='<button onclick="switchTab(\''+fid+'\',\'settlements\')" class="bg-surface-card text-brand px-3 py-2 rounded-lg text-xs font-semibold shadow-md active:scale-95 transition-transform">Settle</button></div>';
        h+='<div class="absolute -right-10 -bottom-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div></div>';

        // Flatmates horizontal scroll
        if(members.length>0){
            h+='<div class="space-y-3 mt-4"><div class="flex items-center justify-between"><h3 class="font-headline text-base font-bold tracking-tight">Flatmates</h3>';
            h+='<button onclick="switchTab(\''+fid+'\',\'members\')" class="text-brand text-xs font-medium">Manage</button></div>';
            h+='<div class="flex gap-3 overflow-x-auto no-scrollbar -mx-5 px-5">';
            members.forEach(m=>{
                let relation='';
                transfers.forEach(t=>{
                    if(t.from_id===m.id&&t.to_id===S.user.id) relation='<p class="text-[10px] text-brand mt-1">owes you '+CUR+t.amount.toFixed(2)+'</p>';
                    if(t.to_id===m.id&&t.from_id===S.user.id) relation='<p class="text-[10px] text-danger mt-1">you owe '+CUR+t.amount.toFixed(2)+'</p>';
                });
                if(m.id===S.user.id) relation='<p class="text-[10px] text-on-surface-light mt-1">You</p>';
                if(!relation) relation='<p class="text-[10px] text-on-surface-light mt-1">settled</p>';
                h+='<div class="flex-shrink-0 w-28 p-3 bg-surface-card rounded-xl shadow-sm text-center">';
                h+='<div class="w-10 h-10 mx-auto mb-2 rounded-full bg-brand-light flex items-center justify-center"><span class="material-symbols-outlined text-brand text-[20px]">person</span></div>';
                h+='<p class="text-[11px] font-bold truncate">'+esc(m.name)+'</p>'+relation+'</div>';
            });
            h+='</div></div>';
        }

        // Recent activity
        if(expenses.length>0){
            h+='<div class="space-y-3 mt-4"><h3 class="font-headline text-base font-bold tracking-tight">Recent activity</h3>';
            const recent=expenses.slice(0,5);
            const icons=['shopping_basket','bolt','router','restaurant','local_taxi','water_drop'];
            recent.forEach((e,i)=>{
                const isYou=e.payer_id===S.user.id;
                const amtCls=isYou?'text-brand':'text-danger';
                const sign=isYou?'+':'-';
                const share=parseFloat(e.amount)/members.length;
                h+='<div class="flex items-center gap-3 p-3 bg-surface-card rounded-xl shadow-[0_2px_10px_rgba(24,29,28,0.02)]">';
                h+='<div class="w-9 h-9 rounded-lg bg-surface-low flex items-center justify-center text-brand"><span class="material-symbols-outlined text-[20px]">'+icons[i%icons.length]+'</span></div>';
                h+='<div class="flex-1"><p class="text-xs font-bold">'+esc(e.description)+'</p><p class="text-[10px] text-on-surface-light">Paid by '+esc(e.payer_name)+'</p></div>';
                h+='<div class="text-right"><p class="font-headline text-xs font-bold '+amtCls+'">'+sign+CUR+share.toFixed(2)+'</p><p class="text-[9px] text-on-surface-light">'+new Date(e.timestamp).toLocaleDateString()+'</p></div></div>';
            });
            if(expenses.length>5) h+='<button onclick="switchTab(\''+fid+'\',\'expenses\')" class="w-full py-2.5 text-brand text-xs font-semibold border border-brand/10 rounded-xl hover:bg-brand/5 transition-colors">View all transactions</button>';
            h+='</div>';
        }

        el.innerHTML=h;
    }catch(err){ el.innerHTML='<p class="text-center text-on-surface-light text-xs py-8">Error loading data</p>'; }
}
</script>

<script>
// ── Expenses Tab (Split page) ──
const CATEGORIES=[
    {id:'groceries',icon:'shopping_basket',label:'Groceries'},
    {id:'rent',icon:'home_work',label:'Rent'},
    {id:'utilities',icon:'bolt',label:'Utilities'},
    {id:'fun',icon:'theater_comedy',label:'Fun'},
    {id:'food',icon:'restaurant',label:'Food'},
    {id:'transport',icon:'local_taxi',label:'Transport'},
];
let _splitState={category:'groceries',selectedMembers:[],payerId:null,amount:0};

function getCatIcon(desc, category){
    const CAT_ICONS={groceries:'shopping_basket',rent:'home_work',utilities:'bolt',fun:'theater_comedy',food:'restaurant',transport:'local_taxi'};
    if(category && CAT_ICONS[category]) return CAT_ICONS[category];
    const d=(desc||'').toLowerCase();
    if(d.includes('grocer')||d.includes('vegetable')||d.includes('fruit')) return 'shopping_basket';
    if(d.includes('rent')) return 'home_work';
    if(d.includes('electric')||d.includes('bill')||d.includes('utilit')||d.includes('water')||d.includes('gas')) return 'bolt';
    if(d.includes('movie')||d.includes('fun')||d.includes('game')||d.includes('party')) return 'theater_comedy';
    if(d.includes('food')||d.includes('dinner')||d.includes('lunch')||d.includes('breakfast')||d.includes('restaurant')) return 'restaurant';
    if(d.includes('taxi')||d.includes('uber')||d.includes('cab')||d.includes('fuel')||d.includes('petrol')) return 'local_taxi';
    return 'receipt_long';
}

function updateSplitSummary(){
    const el=document.getElementById('split-summary');
    if(!el) return;
    const amt=parseFloat(document.getElementById('e-amount')?.value)||0;
    const payerId=S.user.id;
    const members=flatCache.members||[];
    const sel=_splitState.selectedMembers;

    if(sel.length===0){
        el.innerHTML='<p class="text-on-surface-light text-xs text-center">Select at least one member to split with</p>';
        return;
    }

    const share=amt/sel.length;
    const payerIncluded=sel.includes(payerId);

    let h='';
    sel.forEach(uid=>{
        const m=members.find(x=>x.id===uid);
        if(!m) return;
        if(uid===payerId) return; // payer doesn't owe themselves
        const initial=m.name.charAt(0).toUpperCase();
        h+='<div class="flex items-center justify-between">';
        h+='<div class="flex items-center gap-3">';
        h+='<div class="w-8 h-8 rounded-full bg-brand-light flex items-center justify-center font-bold text-xs text-brand">'+initial+'</div>';
        h+='<span class="font-body text-sm font-medium text-on-surface-light">'+esc(m.name)+' owes</span></div>';
        h+='<span class="font-headline font-bold text-brand">'+CUR+share.toFixed(2)+'</span></div>';
    });

    // If payer is NOT in the split, show a note that full amount is owed by others
    if(!payerIncluded && sel.length>0){
        h+='<p class="text-[10px] text-on-surface-light mt-2 text-center">You paid but aren\'t splitting — full amount owed back to you</p>';
    }

    if(!h && payerIncluded && sel.length===1){
        h='<p class="text-on-surface-light text-xs text-center">Only you are selected — add others to split with</p>';
    }
    el.innerHTML=h;
}

function toggleSplitMember(uid){
    const idx=_splitState.selectedMembers.indexOf(uid);
    if(idx===-1) _splitState.selectedMembers.push(uid);
    else _splitState.selectedMembers.splice(idx,1);
    renderSplitMembers();
    updateSplitSummary();
}

function selectAllSplitMembers(){
    const members=flatCache.members||[];
    _splitState.selectedMembers=members.map(m=>m.id);
    renderSplitMembers();
    updateSplitSummary();
}

function renderSplitMembers(){

async function submitExpense(fid){
    const desc=(document.getElementById('e-desc')?.value||'').trim();
    const amt=parseFloat(document.getElementById('e-amount')?.value);
    if(!desc){ showMsg('Please add a description'); return; }
    if(!amt||amt<=0){ showMsg('Enter a valid amount'); return; }
    if(_splitState.selectedMembers.length===0){ showMsg('Select at least one person to split with'); return; }
    try{
        await api('/api/flats/'+fid+'/expenses',{method:'POST',body:JSON.stringify({
            description:desc,
            amount:amt,
            sharerIds:_splitState.selectedMembers,
            category:_splitState.category
        })});
        showMsg('Expense added!','success');
        flatDetailPage(fid,'expenses');
    }catch(err){ showMsg(err.message); }
}

async function deleteExpense(fid,eid){

let _receiptItems=[];

async function handleReceiptUpload(input){
    const file=input.files&&input.files[0];
    if(!file) return;
    const status=document.getElementById('receipt-status');
    if(status) status.textContent='Scanning receipt...';

    try{
        const b64=await new Promise((res,rej)=>{
            const r=new FileReader();
            r.onload=()=>res(r.result);
            r.onerror=rej;
            r.readAsDataURL(file);
        });
        const d=await api('/api/parse-receipt',{method:'POST',body:JSON.stringify({image:b64,mimeType:file.type||'image/jpeg'})});
        if(d.error&&d.items&&d.items.length===0){
            if(status) status.textContent=d.error;
            return;
        }
        // Store parsed items and show editable table
        _receiptItems=(d.items||[]).map((it,i)=>({id:i,name:it.name||'',price:parseFloat(it.price)||0,category:it.category||'other'}));
        renderReceiptTable();
        // Auto-select category if returned
        if(d.category) pickCategory(d.category);
        if(status) status.innerHTML='<span class="text-brand">Parsed '+_receiptItems.length+' item(s) — edit below then confirm</span>';
    }catch(err){
        if(status) status.textContent=err.message||'Failed to scan receipt';
    }
    input.value='';
}

function renderReceiptTable(){
    const el=document.getElementById('receipt-table');
    if(!el) return;
    if(_receiptItems.length===0){ el.innerHTML=''; return; }

    let total=0;
    let h='<div class="bg-surface-card rounded-2xl shadow-[0_4px_20px_rgba(24,29,28,0.04)] overflow-hidden">';
    h+='<div class="flex items-center justify-between px-4 py-3 bg-brand-light/40 border-b border-brand/10">';
    h+='<span class="font-headline font-bold text-xs text-brand">Scanned Items</span>';
    h+='<button onclick="confirmReceiptItems()" class="px-3 py-1 bg-brand text-white rounded-lg text-[10px] font-semibold active:scale-95 transition-transform">Confirm All</button></div>';
    h+='<table class="w-full text-xs"><thead><tr class="text-on-surface-light text-[10px] uppercase tracking-wider">';
    h+='<th class="text-left px-4 py-2 font-bold">Item</th><th class="text-right px-4 py-2 font-bold w-24">Price</th>';
    h+='<th class="w-10 px-2 py-2"></th></tr></thead><tbody>';

    _receiptItems.forEach((it,i)=>{
        total+=it.price;
        h+='<tr class="border-t border-surface-low">';
        h+='<td class="px-4 py-2"><input class="w-full bg-transparent border-none p-0 text-xs font-medium focus:ring-0" value="'+esc(it.name)+'" onchange="updateReceiptItem('+i+',\'name\',this.value)"></td>';
        h+='<td class="px-4 py-2 text-right"><input class="w-full bg-transparent border-none p-0 text-xs font-bold text-right focus:ring-0" type="number" step="0.01" value="'+it.price.toFixed(2)+'" onchange="updateReceiptItem('+i+',\'price\',this.value)"></td>';
        h+='<td class="px-2 py-2 text-center"><button onclick="removeReceiptItem('+i+')" class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-danger-bg transition-colors"><span class="material-symbols-outlined text-danger text-[14px]">close</span></button></td>';
        h+='</tr>';
    });

    h+='<tr class="border-t-2 border-brand/20"><td class="px-4 py-2 font-headline font-bold text-brand">Total</td>';
    h+='<td class="px-4 py-2 text-right font-headline font-bold text-brand">'+CUR+total.toFixed(2)+'</td><td></td></tr>';
    h+='</tbody></table></div>';
    el.innerHTML=h;
}

function updateReceiptItem(idx,field,val){
    if(!_receiptItems[idx]) return;
    if(field==='price') _receiptItems[idx].price=parseFloat(val)||0;
    else _receiptItems[idx][field]=val;
    renderReceiptTable();
}

function removeReceiptItem(idx){
    _receiptItems.splice(idx,1);
    renderReceiptTable();
}

function confirmReceiptItems(){
    if(_receiptItems.length===0) return;
    let total=0;
    const parts=[];
    _receiptItems.forEach(it=>{
        total+=it.price;
        if(it.name) parts.push(it.name+'('+it.price.toFixed(2)+')');
    });
    const amtEl=document.getElementById('e-amount');
    const descEl=document.getElementById('e-desc');
    if(amtEl) amtEl.value=total.toFixed(2);
    if(descEl) descEl.value=parts.join(', ');
    _receiptItems=[];
    renderReceiptTable();
    updateSplitSummary();
    showMsg('Items confirmed — review and submit','success');
}

                h+='</div>';
                // Right side
                h+='<div class="text-right flex-shrink-0 space-y-1">';
                h+='<p class="font-headline font-bold text-sm">'+CUR+parseFloat(s.amount).toFixed(2)+'</p>';
                h+='<span class="px-2 py-0.5 rounded-full text-[9px] font-bold uppercase tracking-wider '+badgeCls+'">'+badgeText+'</span>';
                if(!isConfirmed){
                    h+='<br><button onclick="confirmSettlement(\''+fid+'\',\''+s.id+'\')" class="mt-1 px-2.5 py-1 bg-brand text-white rounded-lg text-[10px] font-semibold active:scale-95 transition-transform">Confirm</button>';
                }
                h+='</div></div>';
            });
        }
        h+='</section>';

        el.innerHTML=h;
        // Render interactive member selectors
        renderSettleMembers('settle-debtors',null,'pickDebtor');
        renderSettleMembers('settle-creditors',null,'pickCreditor');
    }catch(err){ el.innerHTML='<p class="text-center text-on-surface-light text-xs py-8">Error loading settlements</p>'; }
}

async function submitSettlement(fid){
    const a=_settleState.debtorId, b=_settleState.creditorId;
    const amt=parseFloat(document.getElementById('s-amount')?.value);
    if(!a){showMsg('Select who paid');return;}
    if(!b){showMsg('Select who was paid');return;}
    if(a===b){showMsg('Must be different people');return;}
    if(!amt||amt<=0){showMsg('Enter a valid amount');return;}
    try{
        await api('/api/flats/'+fid+'/settlements',{method:'POST',body:JSON.stringify({debtorId:a,creditorId:b,amount:amt})});
        showMsg('Settlement proposed!','success');
        flatDetailPage(fid,'settlements');
    }catch(err){ showMsg(err.message); }
}

async function quickSettle(fid,fromId,toId,amount){
    try{
        await api('/api/flats/'+fid+'/settlements',{method:'POST',body:JSON.stringify({debtorId:fromId,creditorId:toId,amount:amount})});
        showMsg('Settlement proposed!','success');
        flatDetailPage(fid,'settlements');
    }catch(err){ showMsg(err.message); }
}

async function handleSettle(e,fid){ e.preventDefault(); submitSettlement(fid); }

async function confirmSettlement(fid,sid){
    try{ await api('/api/flats/'+fid+'/settlements/'+sid+'/confirm',{method:'POST'}); showMsg('Confirmed!','success'); flatDetailPage(fid,'settlements'); }catch(err){ showMsg(err.message); }
}

// ── Members Tab ──
function renderMembers(fid){
    const m=flatCache.members||[];
    let h='<div class="space-y-2">';
    h+='<h3 class="font-headline text-sm font-bold">Members ('+m.length+')</h3>';
    m.forEach(x=>{
        h+='<div class="flex items-center gap-3 p-3 bg-surface-card rounded-xl shadow-[0_2px_10px_rgba(24,29,28,0.02)]">';
        h+='<div class="w-9 h-9 rounded-full bg-brand-light flex items-center justify-center"><span class="material-symbols-outlined text-brand text-[20px]">person</span></div>';
        h+='<div class="flex-1"><p class="text-xs font-bold">'+esc(x.name)+'</p><p class="text-[10px] text-on-surface-light">'+esc(x.email)+'</p></div>';
        if(x.id!==S.user.id) h+='<button onclick="removeMember(\''+fid+'\',\''+x.id+'\')" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-danger-bg transition-colors"><span class="material-symbols-outlined text-danger text-[18px]">person_remove</span></button>';
        else h+='<span class="px-2 py-0.5 rounded-full text-[10px] font-medium bg-brand-light text-brand">You</span>';
        h+='</div>';
    });
    h+='</div>';
    h+='<div class="bg-surface-card rounded-2xl p-5 shadow-[0_4px_20px_rgba(24,29,28,0.04)] space-y-3 mt-4">';
    h+='<h3 class="font-headline text-sm font-bold">Add Member</h3>';
    h+='<form onsubmit="handleAddMember(event,\''+fid+'\')" class="flex gap-2">';
    h+='<input type="email" id="add-email" placeholder="Email address" class="flex-1 px-3 py-2.5 rounded-xl bg-surface-low border-none text-xs focus:ring-2 focus:ring-brand/30">';
    h+='<button class="px-4 py-2.5 bg-brand text-white rounded-xl text-xs font-semibold active:scale-95 transition-transform" type="submit">Add</button>';
    h+='</form></div>';
    document.getElementById('tab-content').innerHTML=h;
}
async function handleAddMember(e,fid){
    e.preventDefault();
    try{ await api('/api/flats/'+fid+'/members',{method:'POST',body:JSON.stringify({email:document.getElementById('add-email').value})}); showMsg('Added!','success'); flatDetailPage(fid,'members'); }catch(err){ showMsg(err.message); }
}
async function removeMember(fid,uid){
    if(!confirm('Remove this member?')) return;
    try{ await api('/api/flats/'+fid+'/members/'+uid,{method:'DELETE'}); showMsg('Removed','success'); flatDetailPage(fid,'members'); }catch(err){ showMsg(err.message); }
}

// ── Router ──
function route(){
    const hash=location.hash.slice(1)||'';
    if(!S.token){ hideChrome(); return hash==='register'?registerPage():loginPage(); }
    if(hash==='dashboard'||hash==='') return dashboardPage();
    if(hash==='new-flat') return newFlatPage();
    if(hash.startsWith('flat/')) return flatDetailPage(hash.split('/')[1]);
    dashboardPage();
}
window.addEventListener('hashchange',route);
route();
</script>
</body>
</html>
