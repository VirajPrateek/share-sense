<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ShareSense — split expenses with members, track balances, and settle up easily.">
    <title>ShareSense</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#006A6A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="/static/style.css" rel="stylesheet">
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .mso-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { min-height: 100dvh; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body">

<!-- Top Bar -->
<header id="topbar" class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md shadow-[0_4px_20px_rgba(24,29,28,0.04)]" style="display:none">
    <div class="flex items-center justify-between px-5 h-14 max-w-lg mx-auto">
        <button onclick="location.hash='#dashboard'" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-brand-light transition-colors">
            <span class="material-symbols-outlined text-brand" id="topbar-left-icon">home_work</span>
        </button>
        <h1 class="font-headline lowercase text-base tracking-tight font-bold text-brand">sharesense</h1>
        <button onclick="toggleMenu()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-brand-light transition-colors">
            <span class="material-symbols-outlined text-brand text-[20px]">menu</span>
        </button>
    </div>
</header>

<!-- Slide-out Menu -->
<div id="side-menu" class="fixed inset-0 z-[60] hidden">
    <div class="absolute inset-0 bg-on-surface/30 backdrop-blur-sm" onclick="toggleMenu()"></div>
    <div class="absolute right-0 top-0 h-full w-72 bg-surface shadow-xl flex flex-col">
        <div class="p-6 pt-16" id="menu-user"></div>
        <div class="flex-1 px-6 space-y-1" id="menu-items"></div>
        <div class="p-6 space-y-3 border-t border-surface-low">
            <button onclick="logout()" class="w-full py-3 rounded-xl bg-danger-bg text-danger text-xs font-semibold flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-[18px]">logout</span>Logout</button>
            <div class="pt-3 text-center">
                <a href="https://github.com/VirajPrateek/share-sense" target="_blank" class="text-[10px] text-on-surface-light hover:text-brand transition-colors">github/share-sense</a>
            </div>
        </div>
    </div>
</div>

<!-- Main Content -->
<main id="app" class="pt-16 pb-24 px-5 max-w-lg mx-auto space-y-6"></main>

<!-- Bottom Nav -->
<nav id="footer-nav" class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-white/70 backdrop-blur-xl shadow-[0_-10px_40px_rgba(24,29,28,0.06)]" style="display:none">
    <div class="flex justify-around items-center max-w-lg mx-auto px-4 pt-2 pb-3 h-[68px]"></div>
</nav>

<script>
const API = '', CUR = '₹';
const S = { token: localStorage.getItem('ss_token'), user: JSON.parse(localStorage.getItem('ss_user')||'null'), groupId: null, tab: 'ledger' };
let groupCache = {};

function setAuth(t,u){ S.token=t; S.user=u; localStorage.setItem('ss_token',t); localStorage.setItem('ss_user',JSON.stringify(u)); }
function clearAuth(){ S.token=null; S.user=null; localStorage.removeItem('ss_token'); localStorage.removeItem('ss_user'); }
async function api(p,o={}){ const h={'Content-Type':'application/json'}; if(S.token) h['Authorization']='Bearer '+S.token; const r=await fetch(API+p,{...o,headers:h}); const d=await r.json(); if(r.status===401){ clearAuth(); location.hash='#login'; route(); throw new Error('Session expired. Please log in again.'); } if(!r.ok) throw new Error(d.error||d.message||'Failed'); return d; }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
async function logout(){ clearAuth(); hideChrome(); route(); }

function showChrome(){ document.getElementById('topbar').style.display=''; }
function hideChrome(){ document.getElementById('topbar').style.display='none'; document.getElementById('footer-nav').style.display='none'; document.getElementById('side-menu').classList.add('hidden'); }

function toggleMenu(){
    const m=document.getElementById('side-menu');
    m.classList.toggle('hidden');
    if(S.user){
        document.getElementById('menu-user').innerHTML='<div class="flex items-center gap-3"><div class="w-11 h-11 rounded-full bg-brand-light flex items-center justify-center"><span class="material-symbols-outlined text-brand text-[22px]">person</span></div><div><p class="text-sm font-bold font-headline">'+esc(S.user.name||'')+'</p><p class="text-[10px] text-on-surface-light">'+esc(S.user.email||'')+'</p></div></div>';
    }
    let items='';
    if(S.groupId && groupCache.groupId===S.groupId){
        items+='<button onclick="switchTab(\''+S.groupId+'\',\'settlements\');toggleMenu()" class="w-full py-3 text-left text-xs font-medium flex items-center gap-3 text-on-surface hover:text-brand transition-colors rounded-lg hover:bg-brand-light px-3"><span class="material-symbols-outlined text-[18px]">handshake</span>Settlements</button>';
        items+='<button onclick="switchTab(\''+S.groupId+'\',\'members\');toggleMenu()" class="w-full py-3 text-left text-xs font-medium flex items-center gap-3 text-on-surface hover:text-brand transition-colors rounded-lg hover:bg-brand-light px-3"><span class="material-symbols-outlined text-[18px]">group</span>Members & Settings</button>';
    }
    items+='<button onclick="toggleMenu();showJoinDialog()" class="w-full py-3 text-left text-xs font-medium flex items-center gap-3 text-on-surface hover:text-brand transition-colors rounded-lg hover:bg-brand-light px-3"><span class="material-symbols-outlined text-[18px]">login</span>Join Group by Code</button>';
    document.getElementById('menu-items').innerHTML=items;
}

function showFooter(groupId, tab, pendingSettlements){
    S.groupId=groupId; S.tab=tab||'ledger';
    const nav=document.getElementById('footer-nav');
    const tabs=[
        {id:'ledger',icon:'account_balance_wallet',label:'ledger'},
        {id:'expenses',icon:'receipt_long',label:'split'},
        {id:'list',icon:'checklist',label:'list'},
    ];
    const inner=nav.querySelector('div');
    inner.innerHTML=tabs.map(t=>{
        const active=t.id===S.tab;
        const cls=active?'text-brand bg-brand-light rounded-xl px-4 py-1.5':'text-on-surface-light px-4 py-1.5 hover:text-brand';
        const fill=active?'mso-fill':'';
        const badge=(t.id==='settlements'&&pendingSettlements>0)?'<span class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-danger text-white text-[8px] font-bold flex items-center justify-center">'+pendingSettlements+'</span>':'';
        return '<a class="relative flex flex-col items-center justify-center '+cls+' active:scale-90 transition-transform duration-150 cursor-pointer" onclick="switchTab(\''+groupId+'\',\''+t.id+'\')">'+badge+'<span class="material-symbols-outlined '+fill+'">'+t.icon+'</span><span class="font-body text-[10px] font-medium tracking-wide">'+t.label+'</span></a>';
    }).join('');
    nav.style.display='';
}

function showMsg(text, type='error'){
    const ex=document.getElementById('toast'); if(ex) ex.remove();
    const cls = type==='success' ? 'bg-brand text-white' : 'bg-danger text-white';
    const d=document.createElement('div'); d.id='toast';
    d.className='fixed top-16 left-1/2 -translate-x-1/2 z-[99] px-4 py-2 rounded-lg text-xs font-medium shadow-lg '+cls;
    d.textContent=text; document.body.appendChild(d); setTimeout(()=>d.remove(),3000);
}

function switchTab(fid,tab){ groupDetailPage(fid,tab); }

const _googleSVG = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>`;

// ── Auth Pages ──
function loginPage(){
    hideChrome();
    document.getElementById('app').className='flex flex-col items-center justify-center min-h-[80dvh] px-5 max-w-lg mx-auto';
    document.getElementById('app').innerHTML=`
        <div class="w-full space-y-6">
            <div class="text-center space-y-1">
                <h1 class="font-headline text-2xl font-extrabold text-brand lowercase tracking-tight">sharesense</h1>
                <p class="text-on-surface-light text-xs">split expenses, stay in harmony</p>
            </div>
            <div class="bg-surface-card rounded-2xl p-6 shadow-[0_4px_20px_rgba(24,29,28,0.04)] space-y-4">
                <a href="/api/auth/google" class="w-full py-3 rounded-xl border border-surface-low bg-white text-on-surface text-sm font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform hover:bg-surface-low">
                    ${_googleSVG} Continue with Google
                </a>
                <button onclick="toggleEmailLogin()" class="w-full text-center text-xs text-on-surface-light hover:text-brand transition-colors flex items-center justify-center gap-1">
                    <span class="material-symbols-outlined text-[14px]" id="email-toggle-icon">expand_more</span>
                    <span>Sign in with email instead</span>
                </button>
                <div id="email-login-form" class="hidden space-y-3">
                    <form onsubmit="handleLogin(event)" class="space-y-3">
                        <input type="email" id="l-email" placeholder="Email" required class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                        <input type="password" id="l-pass" placeholder="Password" required class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                        <button class="w-full py-3 bg-brand text-white rounded-xl text-sm font-semibold active:scale-[0.98] transition-transform" type="submit">Login</button>
                    </form>
                </div>
                <p class="text-center text-xs text-on-surface-light">No account? <a href="#register" class="text-brand font-semibold">Register</a></p>
            </div>
        </div>`;
}
function toggleEmailLogin(){
    const form = document.getElementById('email-login-form');
    const icon = document.getElementById('email-toggle-icon');
    const hidden = form.classList.toggle('hidden');
    icon.textContent = hidden ? 'expand_more' : 'expand_less';
}
async function handleLogin(e){
    e.preventDefault();
    try{ const d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:document.getElementById('l-email').value,password:document.getElementById('l-pass').value})}); setAuth(d.token,d.user); location.hash='#dashboard'; route(); }catch(err){ showMsg(err.message); }
}
function registerPage(){
    hideChrome();
    document.getElementById('app').className='flex flex-col items-center justify-center min-h-[80dvh] px-5 max-w-lg mx-auto';
    document.getElementById('app').innerHTML=`
        <div class="w-full space-y-6">
            <div class="text-center space-y-1">
                <h1 class="font-headline text-2xl font-extrabold text-brand lowercase tracking-tight">sharesense</h1>
                <p class="text-on-surface-light text-xs">create your account</p>
            </div>
            <div class="bg-surface-card rounded-2xl p-6 shadow-[0_4px_20px_rgba(24,29,28,0.04)] space-y-4">
                <a href="/api/auth/google" class="w-full py-3 rounded-xl border border-surface-low bg-white text-on-surface text-sm font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform hover:bg-surface-low">
                    ${_googleSVG} Continue with Google
                </a>
                <button onclick="toggleEmailRegister()" class="w-full text-center text-xs text-on-surface-light hover:text-brand transition-colors flex items-center justify-center gap-1">
                    <span class="material-symbols-outlined text-[14px]" id="email-reg-toggle-icon">expand_more</span>
                    <span>Register with email instead</span>
                </button>
                <div id="email-register-form" class="hidden space-y-3">
                    <form onsubmit="handleRegister(event)" class="space-y-3">
                        <input type="text" id="r-name" placeholder="Name" required class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                        <input type="email" id="r-email" placeholder="Email" required class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                        <input type="password" id="r-pass" placeholder="Password (min 6 chars)" required minlength="6" class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                        <button class="w-full py-3 bg-brand text-white rounded-xl text-sm font-semibold active:scale-[0.98] transition-transform" type="submit">Register</button>
                    </form>
                </div>
                <p class="text-center text-xs text-on-surface-light">Have an account? <a href="#login" class="text-brand font-semibold">Login</a></p>
            </div>
        </div>`;
}
function toggleEmailRegister(){
    const form = document.getElementById('email-register-form');
    const icon = document.getElementById('email-reg-toggle-icon');
    const hidden = form.classList.toggle('hidden');
    icon.textContent = hidden ? 'expand_more' : 'expand_less';
}
async function handleRegister(e){
    e.preventDefault();
    try{
        await api('/api/auth/register',{method:'POST',body:JSON.stringify({name:document.getElementById('r-name').value,email:document.getElementById('r-email').value,password:document.getElementById('r-pass').value})});
        // Auto-login after registration
        const d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:document.getElementById('r-email').value,password:document.getElementById('r-pass').value})});
        setAuth(d.token,d.user);
        showMsg('Welcome to ShareSense!','success');
        location.hash='#dashboard'; route();
    }catch(err){ showMsg(err.message); }
}
</script>

<script>
// ── Dashboard ──
async function dashboardPage(){
    showChrome(); document.getElementById('footer-nav').style.display='none';
    S.groupId=null; groupCache={};
    const app=document.getElementById('app');
    app.className='pt-16 pb-24 px-5 max-w-lg mx-auto space-y-6';
    app.innerHTML='<div class="text-center py-10 text-on-surface-light text-xs">Loading...</div>';
    try{
        const d=await api('/api/groups');
        let h='<section class="space-y-4">';
        h+='<div class="flex items-center justify-between"><h2 class="font-headline text-xl font-bold tracking-tight">My Groups</h2>';
        h+='<button onclick="location.hash=\'#new-group\'" class="text-brand text-xs font-semibold flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">add_circle</span>New</button></div>';
        if(d.groups.length===0){
            h+='<div class="bg-surface-card rounded-2xl p-8 shadow-[0_4px_20px_rgba(24,29,28,0.04)] text-center"><span class="material-symbols-outlined text-4xl text-on-surface-light mb-2">home_work</span><p class="text-on-surface-light text-xs">No groups yet. Create one!</p></div>';
        } else {
            d.groups.forEach(f=>{
                h+='<a href="#group/'+f.id+'" class="block bg-surface-card rounded-2xl p-5 shadow-[0_4px_20px_rgba(24,29,28,0.04)] active:scale-[0.98] transition-transform">';
                h+='<div class="flex items-center gap-4"><div class="w-11 h-11 rounded-xl bg-brand-light flex items-center justify-center"><span class="material-symbols-outlined text-brand">apartment</span></div>';
                h+='<div class="flex-1"><p class="font-headline text-sm font-bold">'+esc(f.name)+'</p><p class="text-on-surface-light text-[11px]">Joined '+new Date(f.created_at).toLocaleDateString()+'</p></div>';
                h+='<span class="material-symbols-outlined text-on-surface-light text-[20px]">chevron_right</span></div></a>';
            });
        }
        h+='</section>';
        app.innerHTML=h;
    }catch(err){ showMsg(err.message); }
}

function newGroupPage(){
    showChrome(); document.getElementById('footer-nav').style.display='none';
    const app=document.getElementById('app');
    app.className='pt-16 pb-24 px-5 max-w-lg mx-auto space-y-6';
    app.innerHTML=`
        <div class="bg-surface-card rounded-2xl p-6 shadow-[0_4px_20px_rgba(24,29,28,0.04)] space-y-4">
            <h2 class="font-headline text-lg font-bold">Create New Group</h2>
            <form onsubmit="handleCreateGroup(event)" class="space-y-3">
                <input type="text" id="g-name" placeholder="Group name (e.g. Flat 502, Goa Trip)" required class="w-full px-4 py-3 rounded-xl bg-surface-low border-none text-sm focus:ring-2 focus:ring-brand/30">
                <button class="w-full py-3 bg-brand text-white rounded-xl text-sm font-semibold active:scale-[0.98] transition-transform" type="submit">Create</button>
            </form>
            <a href="#dashboard" class="text-brand text-xs font-semibold flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">arrow_back</span>Back</a>
        </div>`;
}
async function handleCreateGroup(e){
    e.preventDefault();
    try{ await api('/api/groups',{method:'POST',body:JSON.stringify({name:document.getElementById('g-name').value})}); showMsg('Group created!','success'); location.hash='#dashboard'; }catch(err){ showMsg(err.message); }
}

function showJoinDialog(){
    const code=prompt('Enter 6-character join code:');
    if(!code||code.trim().length!==6){ if(code!==null) showMsg('Code must be 6 characters'); return; }
    api('/api/groups/join',{method:'POST',body:JSON.stringify({code:code.trim()})})
        .then(d=>{ showMsg('Joined group!','success'); groupCache={}; location.hash='#group/'+d.groupId; route(); })
        .catch(err=>showMsg(err.message));
}

// ── Group Detail ──
async function groupDetailPage(fid,tab){
    tab=tab||'ledger';
    showChrome();
    const app=document.getElementById('app');
    app.className='pt-16 pb-24 px-5 max-w-lg mx-auto space-y-6';

    // Reuse cached group data if switching tabs within the same group
    if(groupCache.groupId===fid && groupCache.group && groupCache.members){
        // Just re-render the tab content without re-fetching
        if(!document.getElementById('tab-content')){
            let h='<div class="flex items-center gap-3 mb-2"><a href="#dashboard" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-brand-light transition-colors"><span class="material-symbols-outlined text-brand text-[20px]">arrow_back</span></a>';
            h+='<h2 class="font-headline text-lg font-bold tracking-tight">'+esc(groupCache.group.name)+'</h2></div>';
            h+='<div id="tab-content"></div>';
            app.innerHTML=h;
        }
        showFooter(fid,tab,groupCache.pendingSettlements||0);
        if(tab==='ledger') renderLedger(fid);
        else if(tab==='expenses') renderExpenses(fid);
        else if(tab==='settlements') renderSettlements(fid);
        else if(tab==='list') renderList(fid);
        else if(tab==='members') renderMembers(fid);
        return;
    }

    app.innerHTML='<div class="text-center py-10 text-on-surface-light text-xs">Loading...</div>';
    try{
        // Fetch group, members, and balances all in parallel
        const [fd,md,bd,sd]=await Promise.all([api('/api/groups/'+fid),api('/api/groups/'+fid+'/members'),api('/api/groups/'+fid+'/balances'),api('/api/groups/'+fid+'/settlements')]);
        groupCache={group:fd.group,members:md.members,groupId:fid,balances:bd,pendingSettlements:sd.pendingForMe||0};
        let h='<div class="flex items-center gap-3 mb-2"><a href="#dashboard" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-brand-light transition-colors"><span class="material-symbols-outlined text-brand text-[20px]">arrow_back</span></a>';
        h+='<h2 class="font-headline text-lg font-bold tracking-tight">'+esc(fd.group.name)+'</h2></div>';
        h+='<div id="tab-content"></div>';
        app.innerHTML=h;
        showFooter(fid,tab,groupCache.pendingSettlements||0);
        if(tab==='ledger') renderLedger(fid);
        else if(tab==='expenses') renderExpenses(fid);
        else if(tab==='settlements') renderSettlements(fid);
        else if(tab==='list') renderList(fid);
        else if(tab==='members') renderMembers(fid);
    }catch(err){ showMsg(err.message); }
}
</script>

<script>
// ── Ledger Tab (Balances + Settlement CTA) ──
async function renderLedger(fid){
    const el=document.getElementById('tab-content');
    try{
        // Use cached balances if available, otherwise fetch
        const bd=groupCache.balances||await api('/api/groups/'+fid+'/balances');
        groupCache.balances=null; // clear after use so next visit refreshes
        const transfers=bd.transfers||[];
        const members=groupCache.members||[];

        // Compute totals for current user
        let youOwe=0, youAreOwed=0;
        transfers.forEach(t=>{
            if(t.from_id===S.user.id) youOwe+=t.amount;
            if(t.to_id===S.user.id) youAreOwed+=t.amount;
        });
        const net=youAreOwed-youOwe;

        let h='';
        // Bento balance cards
        h+='<div class="grid grid-cols-2 gap-3">';
        h+='<div class="col-span-2 p-6 rounded-2xl bg-surface-card shadow-[0_4px_20px_rgba(24,29,28,0.04)] text-center">';
        h+='<p class="text-on-surface-light text-[11px] mb-1">Total Net Balance</p>';
        const netCls=net>=0?'text-brand':'text-danger';
        h+='<h2 class="font-headline font-extrabold text-3xl '+netCls+' tracking-tight">'+(net>=0?'+':'-')+CUR+Math.abs(net).toFixed(2)+'</h2></div>';

async function loadActivity(fid){
    const el=document.getElementById('activity-list');
    if(!el) return;
    el.innerHTML='<div class="text-center py-4 text-on-surface-light text-xs">Loading...</div>';

    const from=document.getElementById('af-from')?.value||'';
    const to=document.getElementById('af-to')?.value||'';
    const memberId=document.getElementById('af-member')?.value||'';

    let qs='?';
    if(from) qs+='from='+from+'T00:00:00&';
    if(to) qs+='to='+to+'T23:59:59&';
    if(memberId) qs+='memberId='+memberId+'&';

    try{
        const d=await api('/api/groups/'+fid+'/activity'+qs);
        const items=d.activity||[];
        if(items.length===0){
            el.innerHTML='<p class="text-center text-on-surface-light text-xs py-6">No activity found</p>';
            return;
        }

        let h='';
        let lastDate='';
        items.forEach(a=>{
            // Date separator
            const dt=new Date(a.timestamp).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
            if(dt!==lastDate){
                lastDate=dt;
                h+='<div class="flex items-center gap-3 mt-3 mb-1"><div class="h-px flex-1 bg-surface-low"></div><span class="text-[10px] text-on-surface-light font-medium">'+dt+'</span><div class="h-px flex-1 bg-surface-low"></div></div>';
            }

            if(a.type==='expense'){
                const icon=getCatIcon(a.description, a.category);
                const isYou=a.payer_id===S.user.id;
                // Build sharer summary
                const sharerNames=a.sharers.map(s=>s.id===S.user.id?'You':s.name);
                const shareInfo=a.sharers.length>0?sharerNames.join(', ')+' · '+CUR+(a.amount/a.sharers.length).toFixed(2)+' each':'';

                h+='<div class="bg-surface-card rounded-xl p-3.5 shadow-[0_2px_10px_rgba(24,29,28,0.02)] space-y-2">';
                h+='<div class="flex items-center gap-3">';
                h+='<div class="w-9 h-9 rounded-lg bg-surface-low flex items-center justify-center text-brand"><span class="material-symbols-outlined text-[20px]">'+icon+'</span></div>';
                h+='<div class="flex-1 min-w-0"><p class="text-xs font-bold truncate cursor-pointer" onclick="this.classList.toggle(\'truncate\')" title="Tap to expand">'+esc(a.description)+'</p>';
                h+='<p class="text-[10px] text-on-surface-light">Paid by '+(isYou?'You':esc(a.payer_name))+'</p></div>';
                h+='<p class="font-headline text-sm font-bold '+(isYou?'text-brand':'text-on-surface')+'">'+CUR+a.amount.toFixed(2)+'</p>';
                h+='</div>';
                if(shareInfo) h+='<p class="text-[10px] text-on-surface-light pl-12">Split: '+esc(shareInfo)+'</p>';
                h+='</div>';

            } else if(a.type==='settlement'){
                const isYouDebtor=a.debtor_id===S.user.id;
                const isYouCreditor=a.creditor_id===S.user.id;
                const statusCls=a.status==='confirmed'?'bg-brand-light text-brand':'bg-amber-50 text-amber-600';

                h+='<div class="bg-surface-card rounded-xl p-3.5 shadow-[0_2px_10px_rgba(24,29,28,0.02)]">';
                h+='<div class="flex items-center gap-3">';
                h+='<div class="w-9 h-9 rounded-lg bg-brand-light flex items-center justify-center"><span class="material-symbols-outlined text-brand text-[20px]">handshake</span></div>';
                h+='<div class="flex-1 min-w-0"><p class="text-xs font-bold">'+(isYouDebtor?'You':esc(a.debtor_name))+' paid '+(isYouCreditor?'You':esc(a.creditor_name))+'</p>';
                h+='<span class="px-1.5 py-0.5 rounded-full text-[9px] font-bold '+statusCls+'">'+a.status+'</span></div>';
                h+='<p class="font-headline text-sm font-bold text-brand">'+CUR+a.amount.toFixed(2)+'</p>';
                h+='</div></div>';
            }
        });
        el.innerHTML=h;
    }catch(err){ el.innerHTML='<p class="text-center text-on-surface-light text-xs py-4">Error loading activity</p>'; }
}

function getCatIcon(desc, category){
    const CAT_ICONS={groceries:'shopping_basket',rent:'home_work',utilities:'bolt',fun:'theater_comedy',food:'restaurant',transport:'local_taxi'};
    if(category && CAT_ICONS[category]) return CAT_ICONS[category];
    const d=(desc||'').toLowerCase();
    if(d.includes('grocer')||d.includes('vegetable')||d.includes('fruit')) return 'shopping_basket';
    if(d.includes('rent')) return 'home_work';
    if(d.includes('electric')||d.includes('bill')||d.includes('utilit')||d.includes('water')||d.includes('gas')) return 'bolt';
    if(d.includes('movie')||d.includes('fun')||d.includes('game')||d.includes('party')) return 'theater_comedy';
    if(d.includes('food')||d.includes('dinner')||d.includes('lunch')||d.includes('breakfast')||d.includes('restaurant')) return 'restaurant';
    if(d.includes('taxi')||d.includes('uber')||d.includes('cab')||d.includes('fuel')||d.includes('petrol')) return 'local_taxi';
    return 'receipt_long';
}

        return;
    }

    const share=amt/sel.length;

    let h='';
    sel.forEach(uid=>{
        const m=members.find(x=>x.id===uid);

// ── Loading overlay for receipt scanning ──
function showScanOverlay(){
    let ov=document.getElementById('scan-overlay');
    if(ov) return;
    ov=document.createElement('div');
    ov.id='scan-overlay';
    ov.className='fixed inset-0 z-[100] bg-on-surface/40 backdrop-blur-sm flex flex-col items-center justify-center gap-4';

}
function hideScanOverlay(){
    const ov=document.getElementById('scan-overlay');
    if(ov) ov.remove();
}

// Resize image client-side before sending to Gemini (saves bandwidth + tokens)
function resizeImage(dataUrl, maxWidth=1024){
    return new Promise(res=>{
        const img=new Image();
        img.onload=()=>{
            let w=img.width, h=img.height;
            if(w<=maxWidth){ res(dataUrl); return; }
            const scale=maxWidth/w;
            w=maxWidth; h=Math.round(img.height*scale);
            const c=document.createElement('canvas');
            c.width=w; c.height=h;
            c.getContext('2d').drawImage(img,0,0,w,h);
            res(c.toDataURL('image/jpeg',0.85));
        };
        img.src=dataUrl;
    });
}

async function handleReceiptUpload(input){
    const file=input.files&&input.files[0];
    if(!file) return;
    showScanOverlay();
    const status=document.getElementById('receipt-status');

    try{
        let b64=await new Promise((res,rej)=>{
            const r=new FileReader();
            r.onload=()=>res(r.result);
            r.onerror=rej;
            r.readAsDataURL(file);
        });
        b64=await resizeImage(b64, 1024);
        const d=await api('/api/parse-receipt',{method:'POST',body:JSON.stringify({image:b64,mimeType:'image/jpeg'})});
        hideScanOverlay();
        if(d.error&&d.items&&d.items.length===0){
            if(status) status.textContent=d.error;
            return;
        }
        // Each item gets its own sharers list (default: all members selected)
        const allIds=(groupCache.members||[]).map(m=>m.id);
        _receiptItems=(d.items||[]).map((it,i)=>({id:i,name:it.name||'',price:parseFloat(it.price)||0,category:it.category||'other',sharers:[...allIds]}));
        renderReceiptTable();
        if(d.category && d.category!=='other') _splitState.category=d.category;
        // Hide manual entry sections — receipt handles splits at item level
        const manualSections=document.getElementById('manual-entry-sections');
        if(manualSections) manualSections.style.display='none';
        if(status) status.innerHTML='<span class="text-brand">Parsed '+_receiptItems.length+' item(s) — assign splits then confirm</span>';
    }catch(err){
        hideScanOverlay();
        if(status) status.textContent=err.message||'Failed to scan receipt';
    }
    input.value='';
}

function toggleReceiptItemSharer(itemIdx, memberId){

    if(!it) return;

    else if(it.sharers.length>1) it.sharers.splice(idx,1); // keep at least 1
    else { showMsg('At least one person must be selected'); return; }
    renderReceiptTable();
}

function updateReceiptItem(idx,field,val){
    if(!_receiptItems[idx]) return;

    renderReceiptTable();
}

    _receiptItems.splice(idx,1);

async function submitReceiptExpenses(){
    if(_receiptItems.length===0) return;
    const fid=groupCache.groupId;
    if(!fid){ showMsg('No group selected'); return; }

    const groups={};
    _receiptItems.forEach(it=>{
        const key=it.sharers.slice().sort().join(',');
        if(!groups[key]) groups[key]={sharers:it.sharers,items:[],total:0,category:it.category||'other'};
        groups[key].items.push(it);
        groups[key].total+=it.price;
    });

    const groupList=Object.values(groups);
    let submitted=0;

    try{
        for(const g of groupList){
            const desc=g.items.map(it=>it.name+'('+it.price.toFixed(2)+')').join(', ');
            await api('/api/groups/'+fid+'/expenses',{method:'POST',body:JSON.stringify({
                description:desc,
                amount:round2(g.total),
                sharerIds:g.sharers,
                category:g.category
            })});
            submitted++;
        }
        _receiptItems=[];
        renderReceiptTable();
        const amtEl=document.getElementById('e-amount');
        const descEl=document.getElementById('e-desc');
        if(amtEl) amtEl.value='';
        if(descEl) descEl.value='';
        showMsg(submitted+' expense(s) added from receipt!','success');
        groupCache={}; groupDetailPage(fid,'expenses');
    }catch(err){ showMsg(err.message); }
}

function round2(n){ return Math.round(n*100)/100; }

}

// ── List Tab (offline-first shopping/to-do list) ──
let _idb = null;

async function getIDB(){
    if(_idb) return _idb;
    return new Promise((res,rej)=>{
        const req=indexedDB.open('sharesense',1);
        req.onupgradeneeded=e=>{
            const db=e.target.result;
            if(!db.objectStoreNames.contains('list_items')){
                const s=db.createObjectStore('list_items',{keyPath:'id'});
                s.createIndex('group_id','group_id',{unique:false});
            }
            if(!db.objectStoreNames.contains('pending_sync')){
                db.createObjectStore('pending_sync',{keyPath:'id',autoIncrement:true});
            }
        };
        req.onsuccess=e=>{ _idb=e.target.result; res(_idb); };
        req.onerror=e=>rej(e.target.error);
    });
}

async function idbGetItems(groupId){
    const db=await getIDB();
    return new Promise((res,rej)=>{
        const tx=db.transaction('list_items','readonly');
        const idx=tx.objectStore('list_items').index('group_id');
        const req=idx.getAll(groupId);
        req.onsuccess=()=>res(req.result);
        req.onerror=()=>rej(req.error);
    });
}

async function idbPutItem(item){
    const db=await getIDB();
    return new Promise((res,rej)=>{
        const tx=db.transaction('list_items','readwrite');
        const req=tx.objectStore('list_items').put(item);
        req.onsuccess=()=>res();
        req.onerror=()=>rej(req.error);
    });
}

async function idbDeleteItem(id){
    const db=await getIDB();
    return new Promise((res,rej)=>{
        const tx=db.transaction('list_items','readwrite');
        const req=tx.objectStore('list_items').delete(id);
        req.onsuccess=()=>res();
        req.onerror=()=>rej(req.error);
    });
}

async function renderList(fid){
    const el=document.getElementById('tab-content');
    el.innerHTML='<div class="text-center py-6 text-on-surface-light text-xs">Loading list...</div>';

    // Load from IndexedDB first (instant, works offline)
    let items=await idbGetItems(fid);
    renderListUI(fid, items);

    // Then try to sync with server
    try{
        const d=await api('/api/groups/'+fid+'/list');
        const serverItems=d.items||[];
        // Update IDB with server data
        for(const it of serverItems) await idbPutItem({...it,group_id:fid});
        renderListUI(fid, serverItems);
    }catch(e){
        // Offline — show cached data with indicator
        const el2=document.getElementById('list-offline-note');
        if(el2) el2.style.display='';
    }
}

function renderListUI(fid, items){
    const el=document.getElementById('tab-content');
    const pending=items.filter(i=>!i.is_done);
    const done=items.filter(i=>i.is_done);

    let h='';

    // Offline note (hidden by default)
    h+='<div id="list-offline-note" class="hidden mb-3 px-3 py-2 bg-amber-50 rounded-lg text-[10px] text-amber-700 flex items-center gap-2"><span class="material-symbols-outlined text-[14px]">wifi_off</span>Offline — showing cached list</div>';

    // Add item input
    h+='<div class="flex gap-2 mb-5">';
    h+='<input id="list-input" type="text" placeholder="Add item..." class="flex-1 px-4 py-3 rounded-xl bg-surface-card shadow-[0_2px_10px_rgba(24,29,28,0.03)] border-none text-sm focus:ring-2 focus:ring-brand/30" onkeydown="if(event.key===\'Enter\')addListItem(\''+fid+'\')">';
    h+='<button onclick="addListItem(\''+fid+'\')" class="px-4 py-3 bg-brand text-white rounded-xl text-sm font-semibold active:scale-95 transition-transform"><span class="material-symbols-outlined text-[20px]">add</span></button>';
    h+='</div>';

    // Pending items
    if(pending.length>0){
        h+='<div class="space-y-2 mb-4">';
        pending.forEach(it=>{
            h+='<div class="flex items-center gap-3 p-3.5 bg-surface-card rounded-xl shadow-[0_2px_10px_rgba(24,29,28,0.02)]">';
            h+='<button onclick="toggleListItem(\''+fid+'\',\''+it.id+'\')" class="w-5 h-5 rounded-full border-2 border-brand flex-shrink-0 hover:bg-brand-light transition-colors"></button>';
            h+='<span class="flex-1 text-sm text-on-surface">'+esc(it.text)+'</span>';
            h+='<button onclick="deleteListItem(\''+fid+'\',\''+it.id+'\')" class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-danger-bg transition-colors"><span class="material-symbols-outlined text-danger text-[14px]">close</span></button>';
            h+='</div>';
        });
        h+='</div>';
    } else {
        h+='<p class="text-center text-on-surface-light text-xs py-6">Nothing on the list yet</p>';
    }

    // Done items (collapsed)
    if(done.length>0){
        h+='<details class="mt-2"><summary class="text-[11px] text-on-surface-light font-medium cursor-pointer select-none">Done ('+done.length+')</summary>';
        h+='<div class="space-y-2 mt-2">';
        done.forEach(it=>{
            h+='<div class="flex items-center gap-3 p-3 bg-surface-low rounded-xl opacity-60">';
            h+='<button onclick="toggleListItem(\''+fid+'\',\''+it.id+'\')" class="w-5 h-5 rounded-full bg-brand flex-shrink-0 flex items-center justify-center"><span class="material-symbols-outlined text-white text-[12px] mso-fill">check</span></button>';
            h+='<span class="flex-1 text-xs text-on-surface-light line-through">'+esc(it.text)+'</span>';
            h+='<button onclick="deleteListItem(\''+fid+'\',\''+it.id+'\')" class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-danger-bg transition-colors"><span class="material-symbols-outlined text-danger text-[12px]">close</span></button>';
            h+='</div>';
        });
        h+='</div></details>';
    }

    el.innerHTML=h;
    // Focus input
    setTimeout(()=>document.getElementById('list-input')?.focus(),100);
}

async function addListItem(fid){
    const input=document.getElementById('list-input');
    const text=(input?.value||'').trim();
    if(!text) return;
    input.value='';

    const id=crypto.randomUUID();
    const item={id,group_id:fid,text,is_done:false,created_by:S.user.id,created_by_name:S.user.name,created_at:new Date().toISOString()};

    // Write to IDB immediately (offline-first)
    await idbPutItem(item);
    // Re-render from IDB
    const items=await idbGetItems(fid);
    renderListUI(fid,items);

    // Try to sync to server
    try{
        await api('/api/groups/'+fid+'/list',{method:'POST',body:JSON.stringify({id,text})});
    }catch(e){
        // Queue for background sync when online
        if('serviceWorker' in navigator && 'SyncManager' in window){
            const reg=await navigator.serviceWorker.ready;
            const db=await getIDB();
            const tx=db.transaction('pending_sync','readwrite');
            tx.objectStore('pending_sync').add({url:'/api/groups/'+fid+'/list',method:'POST',body:JSON.stringify({id,text}),token:S.token});
            await reg.sync.register('sync-list-items');
        }
    }
}

async function toggleListItem(fid,id){
    // Optimistic update in IDB
    const db=await getIDB();
    const tx=db.transaction('list_items','readwrite');
    const store=tx.objectStore('list_items');
    const item=await new Promise(r=>{ const req=store.get(id); req.onsuccess=()=>r(req.result); });
    if(item){ item.is_done=!item.is_done; store.put(item); }
    const items=await idbGetItems(fid);
    renderListUI(fid,items);

    // Sync to server
    try{ await api('/api/groups/'+fid+'/list/'+id,{method:'PATCH'}); }catch(e){}
}

async function deleteListItem(fid,id){
    await idbDeleteItem(id);
    const items=await idbGetItems(fid);
    renderListUI(fid,items);
    try{ await api('/api/groups/'+fid+'/list/'+id,{method:'DELETE'}); }catch(e){}
}

// ── OAuth callback handler ──
// After Google redirects to /#oauth?token=..., pick up the token and log in.
function handleOAuthCallback(){
    const params = new URLSearchParams(location.hash.replace(/^#oauth\??/, ''));
    const token = params.get('token');
    const error = params.get('error');
    if(error){ location.hash='#login'; showMsg('Google sign-in failed: '+error); return false; }
    if(!token){ location.hash='#login'; return false; }
    // Decode the JWT payload to get user info (no verification needed client-side)
    try{
        const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
        // Fetch full user profile then store
        fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+token}})
            .then(r=>r.json())
            .then(d=>{ setAuth(token, d.user); location.hash='#dashboard'; route(); })
            .catch(()=>{ location.hash='#login'; showMsg('Sign-in failed, please try again.'); });
    }catch(e){ location.hash='#login'; }
    return true;
}

// ── Router ──
function route(){
    const hash=location.hash.slice(1)||'';
    if(hash.startsWith('oauth')) return handleOAuthCallback();
    if(!S.token){ hideChrome(); return hash==='register'?registerPage():loginPage(); }
    if(hash==='dashboard'||hash==='') return dashboardPage();
    if(hash==='new-group') return newGroupPage();
    if(hash.startsWith('group/')) return groupDetailPage(hash.split('/')[1]);
    dashboardPage();
}
window.addEventListener('hashchange',route);
route();
